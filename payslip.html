<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payslips</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- Nav -->
  <nav>
    <ul>
      <li><a href="">Home</a></li>
      <li><a href="">Employee info</a></li>
      <li><a href="./payslip.html">Pay slips</a></li>
      <li><a href="">Attendance</a></li>
      <li><a href="./about.html">About us</a></li>
    </ul>
  </nav>

  <button onclick="generatePayslip()">Generate Payslip</button>
  <button onclick="window.print()">Print Payslip</button>

  <div class="payslip">
    <h2>ModernTech Solutions</h2>
    <h3>Employee Payslip</h3>
    
    <hr>
    <p><strong>Employee:</strong><span id="employeeName"></span></p>
    <p><strong>Employee ID:</strong><span id="employeeId"></span></p>
    <p><strong>Department:</strong><span id="department"></span></p>
    <p><strong>Position:</strong><span id="position"></span></p>
    <hr>

    <!-- slip -->
    <table>
        <tr>
            <td>Basic Salary</td>
            <td id="salary"></td>
        </tr>

        <tr>
            <td>Hours Worked</td>
            <td id="hoursWorked"></td>
        </tr>

        <tr>
            <td>Leave Deduction</td>
            <td id="deduction"></td>
        </tr>

        <tr>
            <th>Net Salary</th>
            <th id="netSalary"></th>
        </tr>

    </table>
  </div>
  <script src="./script.js"></script>
</body>
</html>
