<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModernTech Solutions - Time Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --page-bg: #f8f9fa;
            --panel-bg: #ffffff;
            --sidebar-start: #e0f2fe;
            --sidebar-end: #bae6fd;
            --accent: #0496c7;
            --accent-dark: #0369a1;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f8;
            color: #222;
            margin: 0;
            padding: 0;
        }

        .top-navbar {
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            height: 60px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, var(--sidebar-start) 0%, var(--sidebar-end) 100%);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            padding: 1.5rem;
            z-index: 100;
            overflow-y: auto;
            border-right: 1px solid #bae6fd;
            padding-top: 5.5rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-dark);
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 5px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .menu-item:hover, .menu-item.active {
            background-color: rgba(255, 255, 255, 0.7);
            color: var(--accent-dark);
        }

        .sidebar-divider {
            border-top: 1px solid rgba(3, 105, 161, 0.2);
            margin: 1.5rem 0;
        }

        .sub-menu-title {
            color: var(--accent-dark);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            padding-left: 15px;
            margin-bottom: 5px;
            letter-spacing: 0.05em;
            opacity: 0.8;
        }

        .main-content {
            margin-left: 250px;
            padding: 2rem;
            padding-top: 5.5rem;
        }

@media (max-width: 991px) {
    .top-navbar {
      position: sticky;
      top: 0;
    }
    .sidebar {
      width: 100%;
      min-height: auto;
      position: relative;
      padding-top: 1.5rem;
      border-right: none;
      border-bottom: 1px solid #93c5fd;
    }
    .main-content {
      margin-left: 0;
      padding: 1rem;
      padding-top: 1.5rem;
    }
  }

  @media (max-width: 600px) {
    .filters {
      flex-direction: column;
    }
    .filters input,
    .filters select {
      width: 100%;
    }
    .stats {
      flex-direction: column;
    }
    .stat-box {
      width: 100%;
    }
    .card {
      width: 100%;
    }
    #addFormBox {
      width: 100%;
    }
    #addFormBox input,
    #addFormBox select,
    #addFormBox textarea {
      width: 100%;
    }
    table {
      width: 100%;
    }
    #timesheetTable th,
    #timesheetTable td {
      width: 100%;
    }
  }

  @media (max-width: 600px) {
    .sidebar {
      width: 100%;
      min-height: auto;
      position: relative;
      border-right: none;
      border-bottom: 1px solid #93c5fd;
    }
    .main-content {
      margin-left: 0;
      padding: 1rem;
    }
  }
    </style>
</head>

<body>

<div class="dashboard-container">
        <aside class="sidebar">
            <nav class="sidebar-menu main-menu">
                <a href="index.html" class="menu-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="EmployeeRecords.html" class="menu-item"><i class="bi bi-people"></i> Employees</a>
                <a href="TimeOff.html" class="menu-item"><i class="bi bi-calendar-check"></i> Time Off</a>
                <a href="Attendence.html" class="menu-item"><i class="bi bi-calendar-check"></i> Attendence</a>
                <a href="Timetracker.html" class="menu-item active"><i class="bi bi-clock-history"></i> Time Tracker</a>
                <a href="payslip.html" class="menu-item"><i class="bi bi-wallet2"></i> Payroll</a>
                <a href="performance_reviews.html" class="menu-item"><i class="bi bi-bar-chart"></i> Performance</a>
                <a href="#" class="menu-item"><i class="bi bi-file-earmark-bar-graph"></i> Reports</a>
                <a href="Settings.html" class="menu-item"><i class="bi bi-gear"></i> Settings</a>
            </nav>

        <hr class="sidebar-divider">

            <div class="sub-menu-title">Management Logs</div>
            <nav class="sidebar-menu sub-menu">
                <a href="TimeSheet.html" class="menu-item">Time Sheet</a>
                <a href="TimeTracker.html" class="menu-item active">Time Tracker</a>
                <a href="Scheduling.html" class="menu-item">Scheduling</a>
                <a href="reviewcycle.html" class="menu-item">Review Cycle</a>
            </nav>
        </aside>

    <div class="main-content">
        <div class="container-fluid py-4">

            <div class="mb-4">
                <span class="text-uppercase small fw-bold text-primary">Employee Tracker</span>
                <h1 class="fw-bold h2 text-dark mb-0">Task &amp; Project Time Tracker</h1>
            </div>

            <!-- Timer Bar Container -->
            <div class="card border p-4 mb-4 shadow-sm bg-white">
                <div class="row align-items-center g-3">
                    <div class="col-lg-5">
                        <input type="text" id="taskExecutionInput" class="form-control form-control-lg fs-6" placeholder="What are you executing now?">
                    </div>
                    <div class="col-md-4 col-lg-3">
                        <select id="departmentSelect" class="form-select form-select-lg fs-6">
                            <option value="" selected disabled>Select Department</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Development">Development</option>
                            <option value="HR">HR</option>
                            <option value="QA">QA</option>
                            <option value="Sales">Sales</option>
                            <option value="Design">Design</option>
                            <option value="IT">IT</option>
                            <option value="Finance">Finance</option>
                            <option value="Support">Support</option>
                        </select>
                    </div>
                    <div class="col-md-8 col-lg-4 d-flex align-items-center justify-content-end gap-4">
                        <div class="d-flex align-items-center gap-2">
                            <button class="btn btn-sm btn-danger rounded px-2" id="resetTimerBtn">Reset All</button>
                            <span class="fs-3 fw-bold text-dark font-monospace" id="liveTimerDisplay">00:00:00</span>
                        </div>
                        <button class="btn btn-primary btn-lg px-4 fs-6 rounded-pill" id="actionTimerBtn">Start Tracker</button>
                    </div>
                </div>
            </div>

            <!-- Employee Warning Tool (Updated with Employee Name input) -->
            <div class="card border p-4 mb-4 shadow-sm bg-white">
                <h6 class="fw-bold text-danger mb-3"><i class="bi bi-exclamation-triangle-fill"></i> Issue Employee Alert / Warning</h6>
                <div class="row g-3">
                    <div class="col-md-3">
                        <input type="text" id="warningEmployeeName" class="form-control" placeholder="Employee Name (e.g., John Doe)">
                    </div>
                    <div class="col-md-4">
                        <input type="text" id="warningNotes" class="form-control" placeholder="Reason for warning (e.g., Late for shift)...">
                    </div>
                    <div class="col-md-3">
                        <select id="warningType" class="form-select">
                            <option value="[VERBAL WARNING]">Verbal Warning</option>
                            <option value="[WRITTEN WARNING]">Written Warning</option>
                            <option value="[FINAL ALERT]">Final Warning Notice</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="button" class="btn btn-danger w-100" id="submitWarningBtn">Log Warning</button>
                    </div>
                </div>
            </div>

            <!-- Operation Logs View -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold text-dark mb-0">Today's Operation Logs</h5>
                <span class="text-muted small">Session Accumulated: <strong class="text-dark" id="accumulatedTotalDisplay">00:00:00</strong></span>
            </div>

            <div id="logHistoryStack">
            </div>

        </div>
    </div>
</div>

<script>
    // Variables for holding data
    let isTimerRunning = false;
    let timerId = null;

    let totalSeconds = 0;
    let totalMinutes = 0;
    let totalHours = 0;

    let sessionTotalSeconds = 8100; // Starting default time (2 hours 15 mins)
    let loggedEntries = [
        {
            task: "Enterprise Architecture Review",
            dept: "Development",
            timeRange: "09:15 - 11:30",
            duration: "02:15:00",
            isWarning: false
        }
    ];

    // Getting HTML elements
    const actionButton = document.getElementById('actionTimerBtn');
    const displayScreen = document.getElementById('liveTimerDisplay');
    const resetButton = document.getElementById('resetTimerBtn');
    const taskInput = document.getElementById('taskExecutionInput');
    const deptSelect = document.getElementById('departmentSelect');
    const logHistoryStack = document.getElementById('logHistoryStack');
    const accumulatedTotalDisplay = document.getElementById('accumulatedTotalDisplay');
    
    // Warning UI elements
    const warningEmployeeName = document.getElementById('warningEmployeeName');
    const warningNotes = document.getElementById('warningNotes');
    const warningType = document.getElementById('warningType');
    const submitWarningBtn = document.getElementById('submitWarningBtn');

    // Simple number formatting helper
    function formatDigits(h, m, s) {
        let hStr = h < 10 ? "0" + h : h;
        let mStr = m < 10 ? "0" + m : m;
        let sStr = s < 10 ? "0" + s : s;
        return hStr + ":" + mStr + ":" + sStr;
    }

    // Refresh the total session score display
    function updateAccumulatedDisplay() {
        let h = Math.floor(sessionTotalSeconds / 3600);
        let m = Math.floor((sessionTotalSeconds % 3600) / 60);
        let s = sessionTotalSeconds % 60;
        accumulatedTotalDisplay.textContent = formatDigits(h, m, s);
    }

    // UI Loop to show items in list
    function renderAllLogs() {
        logHistoryStack.innerHTML = ""; // Clear existing first

        if (loggedEntries.length === 0) {
            logHistoryStack.innerHTML = '<div class="text-center p-4 text-muted small border rounded bg-white">No ledger tracking entries found.</div>';
            return;
        }

        for (let i = 0; i < loggedEntries.length; i++) {
            let entry = loggedEntries[i];
            
            // Default border and style colors
            let sideBarColor = "#0284c7";
            let rowBackground = "bg-white";
            let warningBadge = "";

            // Change colors if entry is a marked warning template card
            if (entry.isWarning === true) {
                sideBarColor = "#dc3545";
                rowBackground = "bg-danger-subtle";
                warningBadge = '<span class="badge bg-danger text-white ms-2">HR Incident Flag</span>';
            }

            // row string
            let logHtml = '<div class="card p-3 d-flex flex-row justify-content-between align-items-center border shadow-sm rounded mb-2 ' + rowBackground + '">' +
                '<div class="d-flex align-items-center gap-3">' +
                    '<div style="width: 4px; height: 35px; background: ' + sideBarColor + '; border-radius: 4px;"></div>' +
                    '<div>' +
                        '<div class="fw-bold text-dark">' + entry.task + warningBadge + '</div>' +
                        '<span class="badge bg-light text-secondary border mt-1">' + entry.dept + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="d-flex align-items-center gap-4 text-end ms-auto">' +
                    '<span class="text-muted small">' + entry.timeRange + '</span>' +
                    '<span class="fw-bold text-dark font-monospace">' + entry.duration + '</span>' +
                '</div>' +
            '</div>';

            logHistoryStack.innerHTML += logHtml;
        }
    }

    // Warning Submission Event Listener
    submitWarningBtn.addEventListener('click', function() {
        let nameText = warningEmployeeName.value;
        let notesText = warningNotes.value;
        
        if (nameText === "") {
            alert("Please type the employee's name first!");
            return;
        }
        if (notesText === "") {
            alert("Please type a reason for the warning first!");
            return;
        }

        let typeValue = warningType.value;
        let now = new Date();
        let timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        // a manual entry object linking the employee's name
        let newWarningLog = {
            task: typeValue + " issued to " + nameText + " (" + notesText + ")",
            dept: "HR / Corporate Governance",
            timeRange: "Filed at " + timeString,
            duration: "00:00:00",
            isWarning: true
        };

        // the entry on top of the historical record array
        loggedEntries.unshift(newWarningLog);
        renderAllLogs();

        // Clear input field values
        warningEmployeeName.value = "";
        warningNotes.value = "";
    });

    // Function that runs every second when timer is on
    function cycleTimeTracker() {
        totalSeconds++;
        if (totalSeconds === 60) {
            totalSeconds = 0;
            totalMinutes++;
            if (totalMinutes === 60) {
                totalMinutes = 0;
                totalHours++;
            }
        }
        displayScreen.textContent = formatDigits(totalHours, totalMinutes, totalSeconds);
    }

    // Start / Stop Click Event Handler
    actionButton.addEventListener('click', function() {
        if (isTimerRunning === false) {
            // Start Action
            isTimerRunning = true;
            actionButton.textContent = "Stop Timer";
            actionButton.className = "btn btn-dark btn-lg px-4 fs-6 rounded-pill";
            timerId = setInterval(cycleTimeTracker, 1000);
        } else {
            // Stop Action
            isTimerRunning = false;
            actionButton.textContent = "Start Tracker";
            actionButton.className = "btn btn-primary btn-lg px-4 fs-6 rounded-pill";
            clearInterval(timerId);

            let trackedSeconds = (totalHours * 3600) + (totalMinutes * 60) + totalSeconds;

            if (trackedSeconds > 0) {
                let taskName = taskInput.value || "General Administration Activity";
                let deptName = deptSelect.value || "Operations";
                let durationString = formatDigits(totalHours, totalMinutes, totalSeconds);

                sessionTotalSeconds += trackedSeconds;
                updateAccumulatedDisplay();

                let now = new Date();
                let endStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let startStr = "Tracked"; 

                // Add entry to array structure
                let newLog = {
                    task: taskName,
                    dept: deptName,
                    timeRange: startStr + " -> " + endStr,
                    duration: durationString,
                    isWarning: false
                };

                loggedEntries.unshift(newLog); // Put entry on top
                renderAllLogs();
            }

            // Clear inputs and internal tracker numbers
            taskInput.value = "";
            deptSelect.value = "";
            totalSeconds = 0;
            totalMinutes = 0;
            totalHours = 0;
            displayScreen.textContent = "00:00:00";
        }
    });

    // Reset button tracking system values 
    resetButton.addEventListener('click', function() {
        clearInterval(timerId);
        isTimerRunning = false;
        
        actionButton.textContent = "Start Tracker";
        actionButton.className = "btn btn-primary btn-lg px-4 fs-6 rounded-pill";
        
        totalSeconds = 0;
        totalMinutes = 0;
        totalHours = 0;
        displayScreen.textContent = "00:00:00";
        
        sessionTotalSeconds = 0;
        loggedEntries = [];
        
        taskInput.value = "";
        deptSelect.value = "";
        warningEmployeeName.value = "";
        warningNotes.value = "";
        
        updateAccumulatedDisplay();
        renderAllLogs();
    });

    // Run basic layout initialization on open
    renderAllLogs();
    updateAccumulatedDisplay();
</script>

</body>
</html>
